<!DOCTYPE html>
<html lang="ko">

<head>
  <!-- 문자 인코딩 설정 (한글 깨짐 방지) -->
  <meta charset="UTF-8">

  <!-- 스마트폰 화면 크기에 맞게 조정 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 브라우저 탭에 표시되는 제목 -->
  <title>학교 안내도</title>

  <style>
    /* 전체 페이지 기본 설정 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif;
      background-color: #f9f9f9;
      color: #333;
      min-height: 100vh;
    }

    /* ── 상단 검색바 영역 ── */
    .header {
      background-color: white;
      padding: 14px 16px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
      position: sticky; /* 스크롤해도 상단에 고정 */
      top: 0;
      z-index: 100;
    }

    /* 검색창 감싸는 박스 */
    .search-box {
      display: flex;
      align-items: center;
      background-color: #f2f2f2;
      border-radius: 20px;
      padding: 10px 16px;
      gap: 8px;
    }

    /* 돋보기 아이콘 */
    .search-icon {
      font-size: 16px;
      color: #888;
      flex-shrink: 0;
    }

    /* 검색 입력창 */
    .search-input {
      border: none;
      background: transparent;
      font-size: 15px;
      color: #333;
      width: 100%;
      outline: none;
      font-family: inherit;
    }

    /* 검색창 placeholder 글씨 색상 */
    .search-input::placeholder {
      color: #aaa;
    }

    /* ── 메인 문구 영역 ── */
    .main-content {
      text-align: center;
      padding: 36px 20px 16px;
    }

    /* 메인 문구 */
    .main-text {
      font-size: 20px;
      font-weight: 700;
      color: #222;
      margin-bottom: 6px;
    }

    /* 메인 문구 아래 작은 안내 문구 */
    .sub-text {
      font-size: 13px;
      color: #999;
    }

    /* ── 장소 목록 영역 ── */
    .list-wrap {
      padding: 12px 16px 100px;
    }

    /* 목록 라벨 (전체 장소 / 검색 결과 N개) */
    .list-label {
      font-size: 13px;
      color: #999;
      margin-bottom: 10px;
      padding-left: 2px;
    }

    /* 장소 카드 하나 */
    .place-card {
      background: white;
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: box-shadow 0.15s;
    }

    /* 카드 누를 때 살짝 강조 */
    .place-card:active {
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.15);
    }

    /* 층수 뱃지 (파란 동그라미) */
    .floor-badge {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background-color: #e8f0fe;
      color: #2563eb;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* 장소 이름과 설명 감싸는 박스 */
    .place-info {
      flex: 1;
    }

    /* 장소 이름 */
    .place-name {
      font-size: 15px;
      font-weight: 600;
      color: #222;
      margin-bottom: 3px;
    }

    /* 장소 설명 (층, 종류) */
    .place-desc {
      font-size: 13px;
      color: #999;
    }

    /* 검색 결과 없을 때 문구 */
    .no-result {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      font-size: 15px;
    }

    /* ── 팝업 배경 (반투명 어두운 화면) ── */
    .modal-backdrop {
      display: none; /* 기본 숨김 */
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 200;
      align-items: flex-end; /* 팝업을 화면 하단에서 올라오게 */
      justify-content: center;
    }

    /* 팝업이 열릴 때 보이게 */
    .modal-backdrop.open {
      display: flex;
    }

    /* ── 팝업 창 본체 ── */
    .modal {
      background: white;
      width: 100%;
      max-width: 480px;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      animation: slideUp 0.25s ease;
    }

    /* 팝업이 아래에서 위로 올라오는 애니메이션 */
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    /* 팝업 상단 핸들 바 */
    .modal-handle {
      width: 40px;
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    /* 팝업 헤더 (제목 + 닫기 버튼) */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    /* 팝업 장소 이름 */
    .modal-title {
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }

    /* 팝업 닫기 버튼 (X) */
    .modal-close {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #f2f2f2;
      border: none;
      font-size: 16px;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 팝업 층수/종류 뱃지 */
    .modal-badge {
      display: inline-block;
      background: #e8f0fe;
      color: #2563eb;
      font-size: 13px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    /* 팝업 구분선 */
    .modal-divider {
      height: 1px;
      background: #f0f0f0;
      margin: 16px 0;
    }

    /* 팝업 상세정보 행 하나 */
    .modal-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    /* 상세정보 아이콘 */
    .modal-row-icon {
      font-size: 16px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* 상세정보 내용 */
    .modal-row-content {
      flex: 1;
    }

    /* 상세정보 라벨 */
    .modal-row-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 2px;
    }

    /* 상세정보 값 */
    .modal-row-value {
      font-size: 14px;
      color: #333;
      line-height: 1.5;
    }
  </style>
</head>

<body>

  <!-- 상단 검색바 -->
  <div class="header">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input
        class="search-input"
        type="text"
        placeholder="장소를 검색해보세요"
        oninput="onSearch(this.value)"
      />
    </div>
  </div>

  <!-- 메인 문구 -->
  <div class="main-content">
    <p class="main-text">원하는 장소를 쉽게 찾아보세요</p>
    <p class="sub-text">검색하거나 아래 목록에서 선택하세요</p>
  </div>

  <!-- 장소 목록 (기본 전체 표시, 검색 시 필터링) -->
  <div class="list-wrap">
    <p class="list-label" id="list-label">전체 장소</p>
    <div id="place-list"></div>
  </div>

  <!-- ── 팝업 (장소 클릭 시 등장) ── -->
  <div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
    <div class="modal" id="modal">
      <!-- 상단 핸들 바 -->
      <div class="modal-handle"></div>

      <!-- 헤더: 제목 + 닫기 버튼 -->
      <div class="modal-header">
        <span class="modal-title" id="modal-title"></span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>

      <!-- 층수·종류 뱃지 -->
      <span class="modal-badge" id="modal-badge"></span>

      <div class="modal-divider"></div>

      <!-- 상세 정보 행들 -->
      <div id="modal-body"></div>
    </div>
  </div>

    /* =====================================================
       페이지 첫 로딩 시 전체 장소 목록 표시
       ===================================================== */
    function init() {
      renderList(PLACES, '전체 장소');
    }

    /* =====================================================
       검색 함수 — 입력값이 바뀔 때마다 실행됨
       ===================================================== */
    function onSearch(keyword) {
      if (keyword.trim() === '') {
        /* 검색어가 없으면 전체 목록으로 되돌림 */
        renderList(PLACES, '전체 장소');
        return;
      }

      /* 이름 또는 종류에 검색어가 포함된 것만 필터링 */
      const filtered = PLACES.filter(place =>
        place.name.includes(keyword.trim()) ||
        place.type.includes(keyword.trim())
      );

      renderList(filtered, `검색 결과 ${filtered.length}개`);
    }

    /* =====================================================
       목록 렌더링 함수 — 장소 배열을 카드로 그려줌
       ===================================================== */
    function renderList(places, labelText) {
      document.getElementById('list-label').textContent = labelText;
      const container = document.getElementById('place-list');

      /* 결과 없을 때 */
      if (places.length === 0) {
        container.innerHTML = `<div class="no-result">😥 검색 결과가 없어요</div>`;
        return;
      }

      /* 카드 목록 생성 — onclick으로 팝업 열기 */
      container.innerHTML = places.map(place => `
        <div class="place-card" onclick="openModal(${PLACES.indexOf(place)})">
          <div class="floor-badge">${place.floor}층</div>
          <div class="place-info">
            <div class="place-name">${place.name}</div>
            <div class="place-desc">${place.floor}층 · ${place.type}</div>
          </div>
        </div>
      `).join('');
    }

    /* =====================================================
       팝업 열기 — 장소 카드 클릭 시 실행됨
       ===================================================== */
    function openModal(index) {
      const place = PLACES[index];
      const d = place.details;

      /* 팝업 제목 설정 */
      document.getElementById('modal-title').textContent =
        d.icon + ' ' + place.name;

      /* 뱃지 설정 */
      document.getElementById('modal-badge').textContent =
        place.floor + '층 · ' + place.type;

      /* 상세 정보 내용 설정 */
      document.getElementById('modal-body').innerHTML = `
        <div class="modal-row">
          <span class="modal-row-icon">📍</span>
          <div class="modal-row-content">
            <div class="modal-row-label">위치</div>
            <div class="modal-row-value">${d.location}</div>
          </div>
        </div>
        <div class="modal-row">
          <span class="modal-row-icon">ℹ️</span>
          <div class="modal-row-content">
            <div class="modal-row-label">안내</div>
            <div class="modal-row-value">${d.desc}</div>
          </div>
        </div>
      `;

      /* 팝업 표시 */
      document.getElementById('modal-backdrop').classList.add('open');

      /* 팝업 열릴 때 배경 스크롤 막기 */
      document.body.style.overflow = 'hidden';
    }

    /* =====================================================
       팝업 닫기 — 닫기 버튼 또는 배경 클릭 시 실행됨
       ===================================================== */
    function closeModal(event) {
      /* 배경 클릭 시에만 닫힘 (팝업 창 자체 클릭은 무시) */
      if (event && event.target !== document.getElementById('modal-backdrop')) {
        return;
      }

      document.getElementById('modal-backdrop').classList.remove('open');

      /* 스크롤 다시 허용 */
      document.body.style.overflow = '';
    }

    /* =====================================================
       페이지 로딩 완료 시 초기화 실행
       ===================================================== */
    window.onload = init;
  </script>
